<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Zaloguj się do Planera</title>
    <meta name="description" content="Strona logowania do Elektronicznego Planera.">
</head>
<body>

    <header>
        <nav>
            <a href="index.html">Powrót do strony głównej</a>
        </nav>
        <h1>Logowanie do Elektronicznego Planera</h1>
    </header>

    <main>
        <section id="login-form-container" class="card">
            <h2>Wprowadź swoje dane</h2>

            <form id="loginForm" action="/login" method="POST">

                <div class="form-group">
                    <label for="email">Adres e-mail:</label>
                    <input type="email" id="email" name="email" required>
                    <div id="emailError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="password">Hasło:</label>
                    <input type="password" id="password" name="password" minlength="6" required>
                    <div id="passwordError" class="error-message"></div>
                </div>

                <button type="submit">Zaloguj się</button>
            </form>

            <p>Nie masz konta? <a href="register.html">Zarejestruj się tutaj</a>.</p>
            <p><a href="forgot-password.html">Zapomniałem hasła</a></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Elektroniczny Planner.</p>
    </footer>

    <script src="script.js" defer></script>

</body>
</html>
